services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: vector_match
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"

  app:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/vector_match
    command: sh -c "uv run alembic upgrade head && uv run uvicorn vector_match.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  worker:
    build: ./backend
    env_file: .env
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/vector_match
    command: uv run python -m vector_match.worker
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build: ./web
    restart: unless-stopped
    environment:
      BACKEND_URL: http://app:8000
      # 默认复用后端的 API_KEYS（仅适用于单 key；逗号分隔多 key 时请显式设置 API_KEY 为其中一个）
      API_KEY: ${API_KEY:-${API_KEYS:-dev-key}}
    depends_on:
      - app
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    ports:
      - "3000:3000"

volumes:
  pgdata:
